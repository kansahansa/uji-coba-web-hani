<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Hani</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #555;
    }

    p {
      font-size: 1rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Halo, selamat datang! 👋</h1>
    <p>Website ini masih dalam pengerjaan.</p>
  </div>
</body>
</html>
